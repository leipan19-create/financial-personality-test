<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人格实验室</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    color: #e0e0e0; padding: 20px;
  }
  .container { max-width: 720px; width: 100%; text-align: center; }
  .header { margin-bottom: 48px; }
  .header h1 {
    font-size: 42px; font-weight: 700;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 12px;
  }
  .header p { color: #94a3b8; font-size: 16px; line-height: 1.7; }
  .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
  .card {
    flex: 1; min-width: 280px; max-width: 340px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 36px 28px;
    text-align: left; transition: all 0.3s;
    text-decoration: none; color: inherit; display: block;
  }
  .card:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(167,139,250,0.3);
    transform: translateY(-2px);
  }
  .card-icon { font-size: 36px; margin-bottom: 16px; }
  .card h2 { font-size: 22px; color: #f1f5f9; margin-bottom: 8px; }
  .card .meta { font-size: 13px; color: #94a3b8; margin-bottom: 14px; }
  .card .desc { font-size: 14px; color: #cbd5e1; line-height: 1.7; }
  .card .enter {
    display: inline-block; margin-top: 20px;
    padding: 8px 24px; border-radius: 20px;
    background: rgba(167,139,250,0.15);
    color: #a78bfa; font-size: 14px; font-weight: 500;
    transition: background 0.2s;
  }
  .card:hover .enter { background: rgba(167,139,250,0.25); }
  .footer { margin-top: 48px; color: #64748b; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>人格实验室</h1>
    <p>两个测试，看清你的金钱模式与职业本能。<br>不做心理分析，只做一面镜子。</p>
  </div>
  <div class="cards">
    <a class="card" href="/cs/">
      <div class="card-icon">💰</div>
      <h2>财富人格测试</h2>
      <div class="meta">9 种人格 · 30 题 · 约 3 分钟</div>
      <div class="desc">你的金钱潜意识是什么？从财富观、消费观和决策模式三个维度，交叉出 9 种独特的金钱人格。是守财龟还是冒险狮？一测便知。</div>
      <span class="enter">开始测试 →</span>
    </a>
    <a class="card" href="/zs/">
      <div class="card-icon">💼</div>
      <h2>职商人格测试</h2>
      <div class="meta">16 种人格 · 30 题 · 约 3 分钟</div>
      <div class="desc">你的职业 DNA 是什么？从职业动力和职业策略两个维度，映射出 16 种职场人格。知道为什么你在周一早上按掉闹钟的真正原因。</div>
      <span class="enter">开始测试 →</span>
    </a>
  </div>
  <div class="footer">让产品说话</div>
</div>
</body>
</html>
