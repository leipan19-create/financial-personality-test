<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>认知自己 | 财商 × 职商人格测试</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0e14;
    color: #e8e8f0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 720px;
    margin: 0 auto;
    padding: 80px 24px 60px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  /* ── Hero ── */
  .hero-tag {
    display: inline-block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #a0a0c0;
    background: rgba(120,80,255,0.08);
    border: 1px solid rgba(120,80,255,0.15);
    border-radius: 30px;
    padding: 6px 18px;
    margin-bottom: 28px;
  }

  .hero-title {
    font-size: 40px;
    font-weight: 900;
    line-height: 1.25;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #c4b5fd 0%, #67e8f9 50%, #f0c040 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-desc {
    font-size: 17px;
    color: #8888aa;
    line-height: 1.7;
    max-width: 500px;
    margin-bottom: 48px;
  }

  /* ── Tests Grid ── */
  .tests {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    width: 100%;
    margin-bottom: 48px;
  }

  .test-card {
    display: block;
    text-decoration: none;
    background: linear-gradient(145deg, #1a1a2a, #1e1e32);
    border: 1px solid #2a2a44;
    border-radius: 20px;
    padding: 36px 24px 28px;
    text-align: center;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .test-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .test-card.financial::before {
    background: linear-gradient(90deg, #f0c040, #c89620);
  }
  .test-card.career::before {
    background: linear-gradient(90deg, #7c3aed, #2563eb);
  }

  .test-card:hover {
    transform: translateY(-4px);
    border-color: #4a4a6a;
    box-shadow: 0 12px 40px rgba(0,0,0,0.3);
  }
  .test-card.financial:hover { box-shadow: 0 12px 40px rgba(240,192,64,0.08); }
  .test-card.career:hover { box-shadow: 0 12px 40px rgba(124,58,237,0.1); }

  .test-icon {
    font-size: 52px;
    display: block;
    margin-bottom: 16px;
  }

  .test-name {
    font-size: 22px;
    font-weight: 800;
    margin-bottom: 8px;
    color: #f0f0f0;
  }

  .test-tagline {
    font-size: 14px;
    color: #8888aa;
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .test-stat {
    display: inline-block;
    font-size: 12px;
    color: #666688;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    padding: 4px 12px;
  }

  /* ── Footer ── */
  .footer {
    font-size: 13px;
    color: #555566;
    line-height: 1.8;
  }
  .footer strong { color: #8888aa; }

  @media (max-width: 540px) {
    .page { padding: 48px 16px 40px; }
    .hero-title { font-size: 30px; }
    .hero-desc { font-size: 15px; }
    .tests { grid-template-columns: 1fr; }
    .test-card { padding: 28px 20px 22px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="hero-tag">认知 | 决策 | 成长</div>

  <h1 class="hero-title">认识你自己</h1>

  <p class="hero-desc">
    两个测试，两个维度。<br>
    财富人格，读懂你的金钱潜意识；<br>
    职业人格，看清你的职场底层代码。
  </p>

  <div class="tests">
    <a class="test-card financial" href="/cs/">
      <span class="test-icon">💰</span>
      <div class="test-name">财商人格测试</div>
      <div class="test-tagline">9种金钱人格，揭露你对财富的真实态度</div>
      <span class="test-stat">3×3 模型 · 30题 · 约6分钟</span>
    </a>

    <a class="test-card career" href="/zs/">
      <span class="test-icon">🧭</span>
      <div class="test-name">职商人格测试</div>
      <div class="test-tagline">16种职业人格，发现你的职场核心驱动力</div>
      <span class="test-stat">4×4 模型 · 30题 · 约6分钟</span>
    </a>
  </div>

  <div class="footer">
    <strong>好的决策，从认识自己开始。</strong>
  </div>

</div>
</body>
</html>
