<!DOCTYPE html>



<html lang="zh-CN">



<head>



<meta charset="UTF-8">



<meta name="viewport" content="width=device-width, initial-scale=1.0">



<title>财商人格测试 — 你的财商人格是什么？</title>



<style>



  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }







  :root {



    --bg: #1a1a2e;



    --bg2: #16213e;



    --bg3: #0f3460;



    --purple: #7c3aed;



    --purple-light: #9d62f5;



    --purple-dark: #5b21b6;



    --purple-glow: rgba(124, 58, 237, 0.35);



    --text: #f0f0f8;



    --text-muted: #a0a0c0;



    --text-dim: #6060a0;



    --card: rgba(255,255,255,0.05);



    --card-border: rgba(255,255,255,0.08);



    --radius: 16px;



    --radius-sm: 10px;



    /* type colours */



    --blue: #3b82f6;



    --green: #10b981;



    --violet: #8b5cf6;



  }







  html { font-size: 16px; }







  body {



    background: var(--bg);



    color: var(--text);



    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;



    min-height: 100vh;



    display: flex;



    align-items: center;



    justify-content: center;



    padding: 20px;



    background-image: radial-gradient(ellipse at 20% 10%, rgba(124,58,237,0.15) 0%, transparent 60%),



                      radial-gradient(ellipse at 80% 90%, rgba(59,130,246,0.08) 0%, transparent 60%);



  }







  #app {



    width: 100%;



    max-width: 680px;



  }







  /* ── Screens ── */



  .screen { display: none; animation: fadeIn 0.4s ease; }



  .screen.active { display: block; }



  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }







  /* ── Card ── */



  .card {



    background: var(--card);



    border: 1px solid var(--card-border);



    border-radius: var(--radius);



    padding: 36px 32px;



    backdrop-filter: blur(12px);



  }



  @media (max-width: 480px) { .card { padding: 24px 18px; } }







  /* ── Welcome ── */



  .welcome-badge {



    display: inline-block;



    background: var(--purple-glow);



    border: 1px solid rgba(124,58,237,0.4);



    color: var(--purple-light);



    font-size: 12px;



    font-weight: 600;



    letter-spacing: 0.1em;



    text-transform: uppercase;



    padding: 4px 12px;



    border-radius: 20px;



    margin-bottom: 24px;



  }







  .welcome-title {



    font-size: clamp(28px, 6vw, 42px);



    font-weight: 800;



    line-height: 1.2;



    margin-bottom: 16px;



    background: linear-gradient(135deg, #fff 0%, var(--purple-light) 100%);



    -webkit-background-clip: text;



    -webkit-text-fill-color: transparent;



    background-clip: text;



  }







  .welcome-desc {



    color: var(--text-muted);



    font-size: 15px;



    line-height: 1.7;



    margin-bottom: 32px;



  }







  .welcome-meta {



    display: flex;



    gap: 20px;



    margin-bottom: 36px;



    flex-wrap: wrap;



  }







  .meta-item {



    display: flex;



    align-items: center;



    gap: 8px;



    color: var(--text-muted);



    font-size: 13px;



  }







  .meta-dot {



    width: 6px; height: 6px;



    background: var(--purple);



    border-radius: 50%;



    flex-shrink: 0;



  }







  .btn-primary {



    display: inline-flex;



    align-items: center;



    gap: 8px;



    background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dark) 100%);



    color: #fff;



    border: none;



    border-radius: 12px;



    padding: 14px 32px;



    font-size: 16px;



    font-weight: 700;



    cursor: pointer;



    transition: transform 0.15s, box-shadow 0.15s;



    box-shadow: 0 4px 20px var(--purple-glow);



    text-decoration: none;



  }



  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px var(--purple-glow); }



  .btn-primary:active { transform: none; }







  .btn-secondary {



    display: inline-flex;



    align-items: center;



    gap: 6px;



    background: transparent;



    color: var(--text-muted);



    border: 1px solid var(--card-border);



    border-radius: 10px;



    padding: 10px 20px;



    font-size: 14px;



    font-weight: 600;



    cursor: pointer;



    transition: background 0.15s, color 0.15s;



    text-decoration: none;



  }



  .btn-secondary:hover { background: var(--card); color: var(--text); }







  .animals-preview {



    display: flex;



    gap: 10px;



    margin-top: 28px;



    flex-wrap: wrap;



  }







  .animal-chip {



    background: rgba(255,255,255,0.04);



    border: 1px solid rgba(255,255,255,0.08);



    border-radius: 20px;



    padding: 6px 14px;



    font-size: 13px;



    color: var(--text-muted);



  }







  /* ── Progress ── */



  .progress-header {



    margin-bottom: 28px;



  }







  .progress-top {



    display: flex;



    justify-content: space-between;



    align-items: center;



    margin-bottom: 10px;



  }







  .progress-label {



    font-size: 13px;



    color: var(--text-muted);



    font-weight: 600;



  }







  .progress-fraction {



    font-size: 13px;



    color: var(--text-dim);



  }







  .progress-bar-wrap {



    height: 5px;



    background: rgba(255,255,255,0.08);



    border-radius: 10px;



    overflow: hidden;



  }







  .progress-bar-fill {



    height: 100%;



    background: linear-gradient(90deg, var(--purple) 0%, var(--purple-light) 100%);



    border-radius: 10px;



    transition: width 0.4s ease;



  }







  /* ── Question ── */



  .question-num {



    font-size: 11px;



    font-weight: 700;



    color: var(--purple-light);



    text-transform: uppercase;



    letter-spacing: 0.1em;



    margin-bottom: 12px;



  }







  .question-text {



    font-size: clamp(16px, 3.5vw, 20px);



    font-weight: 700;



    line-height: 1.5;



    margin-bottom: 28px;



    color: var(--text);



  }







  .options-list {



    display: flex;



    flex-direction: column;



    gap: 10px;



    margin-bottom: 28px;



  }







  .option-btn {



    display: flex;



    align-items: flex-start;



    gap: 14px;



    background: rgba(255,255,255,0.04);



    border: 1.5px solid rgba(255,255,255,0.09);



    border-radius: var(--radius-sm);



    padding: 14px 16px;



    text-align: left;



    cursor: pointer;



    transition: background 0.15s, border-color 0.15s, transform 0.1s;



    width: 100%;



  }







  .option-btn:hover {



    background: rgba(124,58,237,0.12);



    border-color: rgba(124,58,237,0.45);



    transform: translateX(2px);



  }







  .option-btn.selected {



    background: rgba(124,58,237,0.2);



    border-color: var(--purple);



  }







  .option-letter {



    flex-shrink: 0;



    width: 26px;



    height: 26px;



    border-radius: 8px;



    background: rgba(124,58,237,0.2);



    border: 1px solid rgba(124,58,237,0.35);



    color: var(--purple-light);



    font-size: 12px;



    font-weight: 800;



    display: flex;



    align-items: center;



    justify-content: center;



    flex-shrink: 0;



  }







  .option-btn.selected .option-letter {



    background: var(--purple);



    border-color: var(--purple);



    color: #fff;



  }







  .option-text {



    color: var(--text);



    font-size: 14px;



    line-height: 1.55;



    padding-top: 3px;



  }







  .question-nav {



    display: flex;



    align-items: center;



    justify-content: space-between;



  }







  /* ── Result ── */



  .result-type-badge {



    display: inline-block;



    font-size: 12px;



    font-weight: 700;



    letter-spacing: 0.1em;



    text-transform: uppercase;



    padding: 4px 14px;



    border-radius: 20px;



    margin-bottom: 20px;



  }







  .result-animal {



    font-size: clamp(52px, 12vw, 80px);



    line-height: 1;



    margin-bottom: 8px;



  }







  .result-name {



    font-size: clamp(24px, 5.5vw, 38px);



    font-weight: 900;



    line-height: 1.15;



    margin-bottom: 6px;



  }







  .result-tagline {



    font-size: 14px;



    color: var(--text-muted);



    margin-bottom: 24px;



    font-style: italic;



    line-height: 1.5;



  }







  .match-row {



    display: flex;



    align-items: center;



    gap: 12px;



    background: rgba(255,255,255,0.04);



    border: 1px solid var(--card-border);



    border-radius: 12px;



    padding: 14px 18px;



    margin-bottom: 24px;



  }







  .match-label {



    font-size: 13px;



    color: var(--text-muted);



    flex-shrink: 0;



    font-weight: 600;



  }







  .match-bar-wrap {



    flex: 1;



    height: 8px;



    background: rgba(255,255,255,0.08);



    border-radius: 10px;



    overflow: hidden;



  }







  .match-bar-fill {



    height: 100%;



    border-radius: 10px;



    transition: width 1s ease;



  }







  .match-pct {



    font-size: 18px;



    font-weight: 800;



    flex-shrink: 0;



    min-width: 48px;



    text-align: right;



  }







  .result-summary {



    background: rgba(255,255,255,0.04);



    border: 1px solid var(--card-border);



    border-radius: 12px;



    padding: 18px 20px;



    font-size: 15px;



    line-height: 1.7;



    color: var(--text);



    margin-bottom: 24px;



  }







  .section-title {



    font-size: 12px;



    font-weight: 700;



    letter-spacing: 0.1em;



    text-transform: uppercase;



    color: var(--text-dim);



    margin-bottom: 14px;



    padding-bottom: 8px;



    border-bottom: 1px solid var(--card-border);



  }







  .powers-list, .blindspots-list {



    display: flex;



    flex-direction: column;



    gap: 10px;



    margin-bottom: 24px;



  }







  .power-item {



    display: flex;



    gap: 12px;



    background: rgba(16,185,129,0.06);



    border: 1px solid rgba(16,185,129,0.15);



    border-radius: 12px;



    padding: 14px 16px;



  }







  .power-icon {



    font-size: 18px;



    flex-shrink: 0;



    line-height: 1;



    padding-top: 2px;



  }







  .power-content strong {



    display: block;



    font-size: 14px;



    font-weight: 700;



    color: #6ee7b7;



    margin-bottom: 4px;



  }







  .power-content p {



    font-size: 13px;



    color: var(--text-muted);



    line-height: 1.55;



  }







  .blind-item {



    display: flex;



    gap: 12px;



    background: rgba(245,158,11,0.06);



    border: 1px solid rgba(245,158,11,0.18);



    border-radius: 12px;



    padding: 14px 16px;



  }







  .blind-icon {



    font-size: 18px;



    flex-shrink: 0;



    line-height: 1;



    padding-top: 2px;



  }







  .blind-content strong {



    display: block;



    font-size: 14px;



    font-weight: 700;



    color: #fcd34d;



    margin-bottom: 4px;



  }







  .blind-content p {



    font-size: 13px;



    color: var(--text-muted);



    line-height: 1.55;



  }







  .quote-card {



    background: linear-gradient(135deg, rgba(124,58,237,0.15) 0%, rgba(59,130,246,0.1) 100%);



    border: 1px solid rgba(124,58,237,0.3);



    border-radius: 16px;



    padding: 24px 22px;



    margin-bottom: 24px;



    text-align: center;



  }







  .quote-text {



    font-size: 15px;



    font-weight: 600;



    line-height: 1.7;



    color: var(--text);



    margin-bottom: 10px;



  }







  .quote-tags {



    font-size: 12px;



    color: var(--text-dim);



  }







  .cta-card {



    background: rgba(124,58,237,0.08);



    border: 1px solid rgba(124,58,237,0.25);



    border-radius: 16px;



    padding: 22px 20px;



    margin-bottom: 24px;



    text-align: center;



  }







  .cta-title {



    font-size: 16px;



    font-weight: 800;



    margin-bottom: 8px;



  }







  .cta-desc {



    font-size: 13px;



    color: var(--text-muted);



    line-height: 1.6;



    margin-bottom: 16px;



  }







  .cta-link {



    display: inline-flex;



    align-items: center;



    gap: 8px;



    background: var(--purple);



    color: #fff;



    text-decoration: none;



    border-radius: 10px;



    padding: 12px 24px;



    font-size: 14px;



    font-weight: 700;



    transition: background 0.15s, transform 0.1s;



  }



  .cta-link:hover { background: var(--purple-light); transform: translateY(-1px); }







  .result-actions {



    display: flex;



    gap: 10px;



    flex-wrap: wrap;



  }







  /* ── Divider ── */



  .divider {



    height: 1px;



    background: var(--card-border);



    margin: 24px 0;



  }







  /* ── Score chips ── */



  .score-row {



    display: flex;



    gap: 8px;



    flex-wrap: wrap;



    margin-bottom: 20px;



  }







  .score-chip {



    background: rgba(255,255,255,0.06);



    border: 1px solid rgba(255,255,255,0.1);



    border-radius: 20px;



    padding: 5px 14px;



    font-size: 12px;



    color: var(--text-muted);



    font-weight: 600;



  }







  .score-chip span {



    color: var(--purple-light);



  }







  /* type-specific accent colours */



  .accent-blue .result-name, .accent-blue .match-pct { color: #93c5fd; }



  .accent-blue .match-bar-fill { background: linear-gradient(90deg, #3b82f6, #60a5fa); }



  .accent-blue .result-type-badge { background: rgba(59,130,246,0.15); color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }







  .accent-green .result-name, .accent-green .match-pct { color: #6ee7b7; }



  .accent-green .match-bar-fill { background: linear-gradient(90deg, #10b981, #34d399); }



  .accent-green .result-type-badge { background: rgba(16,185,129,0.12); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }







  .accent-purple .result-name, .accent-purple .match-pct { color: var(--purple-light); }



  .accent-purple .match-bar-fill { background: linear-gradient(90deg, var(--purple), var(--purple-light)); }



  .accent-purple .result-type-badge { background: var(--purple-glow); color: var(--purple-light); border: 1px solid rgba(124,58,237,0.4); }



</style>



</head>



<body>



<div id="app">







  <!-- ══════════════════ WELCOME ══════════════════ -->



  <div id="screen-welcome" class="screen active">



    <div class="card">



      <div class="welcome-badge">财商人格测试</div>



      <h1 class="welcome-title">你的财商人格<br>是什么？</h1>



      <p class="welcome-desc">



        每个人对金钱都有不同的直觉和行动方式。<br>



        30道情景题，3分钟，告诉你你的财商人格类型——以及你最大的财务盲区。



      </p>



      <div class="welcome-meta">



        <div class="meta-item"><div class="meta-dot"></div>30道题</div>



        <div class="meta-item"><div class="meta-dot"></div>约3-4分钟</div>



        <div class="meta-item"><div class="meta-dot"></div>9种人格类型</div>



        <div class="meta-item"><div class="meta-dot"></div>免费 · 纯前端</div>



      </div>



      <button class="btn-primary" onclick="startTest()">开始测试 →</button>



      <div class="animals-preview">



        <div class="animal-chip">🦁 金库警卫</div>



        <div class="animal-chip">🐢 保险箱</div>



        <div class="animal-chip">🐹 钱罐子仓鼠</div>



        <div class="animal-chip">🐰 投资者兔子</div>



        <div class="animal-chip">🦊 聪明狐狸</div>



        <div class="animal-chip">🦅 创业鹰</div>



        <div class="animal-chip">🦉 自由思想家</div>



        <div class="animal-chip">🦆 生活艺术家</div>



        <div class="animal-chip">🦁 潇洒浪子</div>



      </div>



    </div>



  </div>







  <!-- ══════════════════ QUIZ ══════════════════ -->



  <div id="screen-quiz" class="screen">



    <div class="card">



      <div class="progress-header">



        <div class="progress-top">



          <span class="progress-label" id="progress-label">第 1 题 / 共 30 题</span>



          <span class="progress-fraction" id="progress-pct">0%</span>



        </div>



        <div class="progress-bar-wrap">



          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>



        </div>



      </div>







      <div class="question-num" id="q-num">QUESTION 01</div>



      <div class="question-text" id="q-text">题目加载中…</div>







      <div class="options-list" id="options-list"></div>







      <div class="question-nav">



        <button class="btn-secondary" id="btn-prev" onclick="prevQuestion()" style="visibility:hidden">← 上一题</button>



        <span></span>



      </div>



    </div>



  </div>







  <!-- ══════════════════ RESULT ══════════════════ -->



  <div id="screen-result" class="screen">



    <div class="card" id="result-card">



      <!-- dynamically filled -->



    </div>



  </div>







</div>







<script>
// Script runs at bottom of body, DOM already ready




/* ═══════════════════════════════════════════════



   DATA: 30 questions



   Each option carries dimension scores:



   { a1, a2, a3, b1, b2, b3 }



═══════════════════════════════════════════════ */



const questions = [



  /* ── Q1-15: 财富观维度 ── */



  {



    text: "你刚收到一笔15万元的年终奖，最想做的第一件事是：",



    options: [



      { label: "A\", text: \"先存进基金，看看有什么风险投资机会", score: { a2: 1 } },



      { label: "B\", text: \"转入高收益货币基金，锁定风险下限", score: { a1: 1 } },



      { label: "C\", text: \"用一部分去完成一个想做很久的事（旅游/进修/跳槽准备）", score: { a3: 1 } },



      { label: "D\", text: \"分散投资：股票+基金+理财，广撒网", score: { a2: 1 } }



    ]



  },



  {



    text: "在选择理财产品时，你最看重的因素是：",



    options: [



      { label: "A\", text: \"过往收益率和排名", score: { a2: 1 } },



      { label: "B\", text: \"产品是否安全、本金有无风险", score: { a1: 1 } },



      { label: "C\", text: \"是否能帮我提前实现某个人生计划", score: { a3: 1 } },



      { label: "D\", text: \"操作是否简单、省时间", score: { a3: 1 } }



    ]



  },



  {



    text: "你的朋友在小红书上晒出月赚10万的副业机会，邀请你加入。你的第一反应是：",



    options: [



      { label: "A\", text: \"太诱人了，先参加试试，边做边了解风险", score: { a2: 1, b3: 1 } },



      { label: "B\", text: \"先问清楚机制、查一下是否有坑、确认无风险再考虑", score: { a1: 1, b1: 1 } },



      { label: "C\", text: \"谢谢，我目前的收入够用，优先保证生活质量", score: { a3: 1 } },



      { label: "D\", text: \"感兴趣，会理性分析对比，如果逻辑成立就试试", score: { a2: 1, b2: 1 } }



    ]



  },



  {

/* ═══════════════════════════════════════════════



   STATE



═══════════════════════════════════════════════ */



let currentQ = 0;



let answers = new Array(questions.length).fill(null); // index of chosen option







/* ═══════════════════════════════════════════════



   SCREEN HELPERS



═══════════════════════════════════════════════ */



function showScreen(id) {



  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));



  document.getElementById(id).classList.add('active');



}







/* ═══════════════════════════════════════════════



   QUIZ LOGIC



═══════════════════════════════════════════════ */



function startTest() {



  currentQ = 0;



  answers = new Array(questions.length).fill(null);



  showScreen('screen-quiz');



  renderQuestion();



}







function renderQuestion() {



  const q = questions[currentQ];



  const total = questions.length;







  // progress



  const pct = Math.round((currentQ / total) * 100);



  document.getElementById('progress-label').textContent = `第 ${currentQ + 1} 题 / 共 ${total} 题`;



  document.getElementById('progress-pct').textContent = pct + '%';



  document.getElementById('progress-fill').style.width = pct + '%';







  // question



  document.getElementById('q-num').textContent = 'QUESTION ' + String(currentQ + 1).padStart(2, '0');



  document.getElementById('q-text').textContent = q.text;







  // options



  const list = document.getElementById('options-list');



  list.innerHTML = '';



  q.options.forEach((opt, i) => {



    const btn = document.createElement('button');



    btn.className = 'option-btn' + (answers[currentQ] === i ? ' selected' : '');



    btn.innerHTML = `<span class=\"option-letter\">${opt.label}</span><span class=\"option-text\">${opt.text}</span>`;



    btn.addEventListener('click', () => selectOption(i));



    list.appendChild(btn);



  });







  // prev button



  const prevBtn = document.getElementById('btn-prev');



  prevBtn.style.visibility = currentQ > 0 ? 'visible' : 'hidden';



}







function selectOption(optionIndex) {



  answers[currentQ] = optionIndex;



  // highlight



  const btns = document.querySelectorAll('.option-btn');



  btns.forEach((b, i) => b.classList.toggle('selected', i === optionIndex));







  // auto-advance after short delay



  setTimeout(() => {



    if (currentQ < questions.length - 1) {



      currentQ++;



      renderQuestion();



    } else {



      showResult();



    }



  }, 280);



}







function prevQuestion() {



  if (currentQ > 0) {



    currentQ--;



    renderQuestion();



  }



}







/* ═══════════════════════════════════════════════



   SCORING



═══════════════════════════════════════════════ */



function calcScores() {



  const totals = { a1: 0, a2: 0, a3: 0, b1: 0, b2: 0, b3: 0 };



  answers.forEach((optIdx, qIdx) => {



    if (optIdx === null) return;



    const scoreMap = questions[qIdx].options[optIdx].score;



    Object.entries(scoreMap).forEach(([k, v]) => { totals[k] += v; });



  });



  return totals;



}







function determineType(scores) {



  // A dimension



  let aMax = Math.max(scores.a1, scores.a2, scores.a3);



  let aCandidates = [];



  if (scores.a1 === aMax) aCandidates.push('A1');



  if (scores.a2 === aMax) aCandidates.push('A2');



  if (scores.a3 === aMax) aCandidates.push('A3');



  // tie-break: prefer A2



  let aType = aCandidates.includes('A2') ? 'A2' : aCandidates[0];







  // B dimension



  let bMax = Math.max(scores.b1, scores.b2, scores.b3);



  let bCandidates = [];



  if (scores.b1 === bMax) bCandidates.push('B1');



  if (scores.b2 === bMax) bCandidates.push('B2');



  if (scores.b3 === bMax) bCandidates.push('B3');



  // tie-break: prefer B2



  let bType = bCandidates.includes('B2') ? 'B2' : bCandidates[0];







  return aType + bType;



}







function calcMatchPct(scores, typeId) {



  // Maximum possible score per dimension is roughly 5 (5 questions × 1 point each in primary block)



  // We calculate: (primary A score + primary B score) / (5 + 5) × 100



  const aKey = typeId.substring(0, 2).toLowerCase();



  const bKey = typeId.substring(2, 4).toLowerCase();



  const aScore = scores[aKey];



  const bScore = scores[bKey];



  // find max A and B to show relative match



  const aMax = Math.max(scores.a1, scores.a2, scores.a3);



  const bMax = Math.max(scores.b1, scores.b2, scores.b3);



  // total possible: we cap at 5 per dimension



  const maxPossible = 10;



  const achieved = aScore + bScore;



  let pct = Math.round((achieved / maxPossible) * 100);



  // floor at 50, feel more satisfying



  pct = Math.max(50, Math.min(99, pct));



  return pct;



}

    if (fill) fill.style.width = matchPct + '%';



    // count up number



    let n = 0;



    const interval = setInterval(() => {



      n = Math.min(n + 2, matchPct);



      if (pctText) pctText.textContent = n + '%';



      if (n >= matchPct) clearInterval(interval);



    }, 20);



  }, 100);
