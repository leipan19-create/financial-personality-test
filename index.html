<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>财商人格测试 — 你的财商人格是什么？</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:    #1a1a2e;
  --bg2:   #16213e;
  --bg3:   #0f3460;
  --accent:#7c5cbf;
  --accent2:#9b7ee0;
  --text:  #e8e8f0;
  --text2: #a8a8c0;
  --card:  #1e1e3a;
  --border:#2a2a4a;
  --gold:  #f0c040;
  --green: #48c78e;
  --red:   #f14668;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── SCREENS ── */
.screen { display: none; width: 100%; max-width: 680px; padding: 24px 16px; }
.screen.active { display: block; }

/* ── WELCOME ── */
#screen-welcome { text-align: center; padding-top: 60px; }
.welcome-emoji { font-size: 72px; margin-bottom: 16px; }
.welcome-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
.welcome-sub { font-size: 15px; color: var(--text2); margin-bottom: 32px; line-height: 1.6; }
.welcome-tags { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 36px; }
.tag { background: var(--bg3); padding: 6px 14px; border-radius: 999px; font-size: 13px; color: var(--text2); }
.btn-primary {
  display: inline-block; background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; font-size: 17px; font-weight: 700; padding: 14px 40px;
  border-radius: 999px; border: none; cursor: pointer;
  box-shadow: 0 4px 20px rgba(124,92,191,.45);
  transition: transform .15s, box-shadow .15s;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(124,92,191,.6); }
.btn-primary:active { transform: translateY(0); }

/* ── QUIZ ── */
#screen-quiz {}
.progress-bar-wrap { height: 6px; background: var(--border); border-radius: 999px; margin-bottom: 10px; }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 999px; transition: width .4s ease; }
.progress-label { font-size: 12px; color: var(--text2); text-align: right; margin-bottom: 24px; }
.question-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px 24px; margin-bottom: 20px;
}
.question-num { font-size: 12px; color: var(--accent2); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.question-text { font-size: 17px; font-weight: 600; line-height: 1.6; }
.options-list { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 14px 16px; cursor: pointer;
  text-align: left; width: 100%; color: var(--text);
  font-size: 15px; line-height: 1.5;
  transition: border-color .15s, background .15s;
}
.option-btn:hover { border-color: var(--accent2); background: #22224a; }
.option-btn:active { background: #2a2a58; }
.option-label {
  min-width: 28px; height: 28px; border-radius: 50%;
  background: var(--bg3); color: var(--accent2);
  font-weight: 700; font-size: 13px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.back-btn {
  background: none; border: 1px solid var(--border); color: var(--text2);
  border-radius: 999px; padding: 8px 20px; font-size: 13px; cursor: pointer;
  transition: border-color .15s;
}
.back-btn:hover { border-color: var(--accent2); color: var(--text); }

/* ── RESULT ── */
#screen-result { padding-top: 32px; }
.result-hero {
  background: linear-gradient(135deg, var(--bg3), var(--bg2));
  border: 1px solid var(--border); border-radius: 20px;
  text-align: center; padding: 36px 24px 28px; margin-bottom: 24px;
}
.result-emoji { font-size: 72px; margin-bottom: 12px; }
.result-label { font-size: 13px; color: var(--accent2); font-weight: 600; letter-spacing: 2px; margin-bottom: 6px; }
.result-name { font-size: 32px; font-weight: 800; margin-bottom: 12px; }
.result-tagline { font-size: 14px; color: var(--text2); line-height: 1.7; }
.score-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 24px; }
.score-cell {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 14px 8px; text-align: center;
}
.score-cell.highlight { border-color: var(--accent2); background: #22224a; }
.score-cell .sc-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.score-cell .sc-val { font-size: 22px; font-weight: 800; color: var(--accent2); }
.score-cell .sc-max { font-size: 11px; color: var(--text2); }
.section-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 16px;
  padding: 22px 20px; margin-bottom: 16px;
}
.section-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.summary-text { font-size: 15px; line-height: 1.75; color: var(--text2); }
.power-item, .blind-item { margin-bottom: 14px; }
.power-title, .blind-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.power-desc, .blind-desc { font-size: 13px; color: var(--text2); line-height: 1.65; }
.quote-box {
  background: linear-gradient(135deg, var(--bg3), #1a1a3e);
  border-left: 4px solid var(--accent2); border-radius: 12px;
  padding: 18px 20px; margin-bottom: 16px;
}
.quote-text { font-size: 15px; font-style: italic; line-height: 1.75; margin-bottom: 8px; }
.quote-tags { font-size: 12px; color: var(--accent2); }
.restart-btn {
  display: block; width: 100%; text-align: center;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; font-size: 16px; font-weight: 700; padding: 15px 20px;
  border-radius: 999px; border: none; cursor: pointer; margin-top: 8px;
  box-shadow: 0 4px 20px rgba(124,92,191,.4);
  transition: transform .15s, box-shadow .15s;
}
.restart-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(124,92,191,.55); }
</style>
</head>
<body>

<!-- WELCOME -->
<div id="screen-welcome" class="screen active">

  <h1 class="welcome-title">财商人格测试</h1>

  <button class="btn-primary" onclick="startQuiz()">开始测试 →</button>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="progress-label" id="progress-label"></div>
  <div class="question-card">

  </div>
  <div class="options-list" id="options-list"></div>
  <div style="margin-top:16px">
    <button class="back-btn" onclick="prevQuestion()" id="back-btn">← 上一题</button>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div class="result-hero">

    <div class="summary-text" id="r-summary"></div>
  </div>
  <div class="section-card">
    <div class="section-title">💪 你的财商超能力</div>

  </div>

  </div>
  <div class="quote-box">
    <div class="quote-text" id="r-quote"></div>
    <div class="quote-tags" id="r-hashtags"></div>
  </div>
  <button class="restart-btn" onclick="restartQuiz()">🔄 再测一次</button>
</div>

var currentQ = 0;
var answers = [];

function showScreen(id) {
  var screens = document.querySelectorAll('.screen');
  for (var i = 0; i < screens.length; i++) {
    screens[i].classList.remove('active');
  }
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startQuiz() {
  currentQ = 0;
  answers = [];
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  var q = QUESTIONS[currentQ];
  var total = QUESTIONS.length;
  var pct = ((currentQ) / total * 100).toFixed(1);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = '第 ' + (currentQ + 1) + ' 题 / 共 ' + total + ' 题';
  document.getElementById('question-num').textContent = 'Q' + (currentQ + 1);
  document.getElementById('question-text').textContent = q.text;
  var list = document.getElementById('options-list');
  list.innerHTML = '';
  for (var i = 0; i < q.options.length; i++) {
    var opt = q.options[i];
    var btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = '<span class="option-label">' + opt.label + '</span><span>' + opt.text + '</span>';
    btn.setAttribute('data-idx', i);
    btn.onclick = (function(idx) { return function() { selectOption(idx); }; })(i);
    list.appendChild(btn);
  }
  var backBtn = document.getElementById('back-btn');
  backBtn.style.display = currentQ === 0 ? 'none' : 'inline-block';
}

function selectOption(optIdx) {
  answers[currentQ] = optIdx;
  currentQ++;
  if (currentQ >= QUESTIONS.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

function calcScores() {
  var scores = { a1: 0, a2: 0, a3: 0, b1: 0, b2: 0, b3: 0 };
  for (var i = 0; i < answers.length; i++) {
    var optIdx = answers[i];
    if (optIdx === undefined || optIdx === null) continue;
    var q = QUESTIONS[i];
    var score = q.options[optIdx].score;
    for (var k in score) {
      if (scores.hasOwnProperty(k)) scores[k] += score[k];
    }
  }
  return scores;
}

function pickDim(s1, s2, s3, tieBreak) {
  var max = Math.max(s1, s2, s3);
  if (s1 === max && s2 === max && s3 === max) return tieBreak;
  if (s1 === max && s2 === max) return tieBreak === 'a2' ? 'a2' : (tieBreak === 'b2' ? 'b2' : 'a2');
  if (s1 === max && s3 === max) return tieBreak;
  if (s2 === max && s3 === max) return tieBreak === 'a2' ? 'a2' : (tieBreak === 'b2' ? 'b2' : 'a2');
  if (s1 === max) return tieBreak.charAt(0) + '1';
  if (s2 === max) return tieBreak.charAt(0) + '2';
  return tieBreak.charAt(0) + '3';
}

function getPersonality(scores) {
  var aDim = pickDim(scores.a1, scores.a2, scores.a3, 'a2');
  var bDim = pickDim(scores.b1, scores.b2, scores.b3, 'b2');
  var key = aDim + '_' + bDim;
  return { key: key, aDim: aDim, bDim: bDim, personality: PERSONALITIES[key] };
}

function showResult() {
  var scores = calcScores();
  var res = getPersonality(scores);
  var p = res.personality;

  document.getElementById('r-emoji').textContent = p.emoji;
  document.getElementById('r-name').textContent = p.emoji + ' ' + p.name;
  document.getElementById('r-tagline').textContent = p.tagline;
  document.getElementById('r-summary').textContent = p.summary;

  // Score grid
  var grid = document.getElementById('score-grid');
  grid.innerHTML = '';
  var dims = [
    { key: 'a1', label: 'A1 安全型' },
    { key: 'a2', label: 'A2 增长型' },
    { key: 'a3', label: 'A3 自由型' },
    { key: 'b1', label: 'B1 谨慎型' },
    { key: 'b2', label: 'B2 平衡型' },
    { key: 'b3', label: 'B3 冲劲型' },
  ];
  var hlKeys = [res.aDim, res.bDim];
  for (var i = 0; i < dims.length; i++) {
    var d = dims[i];
    var cell = document.createElement('div');
    var isHL = hlKeys.indexOf(d.key) !== -1;
    cell.className = 'score-cell' + (isHL ? ' highlight' : '');
    cell.innerHTML = '<div class="sc-label">' + d.label + '</div>' +
      '<div class="sc-val">' + scores[d.key] + '</div>' +
      '<div class="sc-max">/ 5</div>';
    grid.appendChild(cell);
  }

  // Powers
  var powersEl = document.getElementById('r-powers');
  powersEl.innerHTML = '';
  for (var i = 0; i < p.powers.length; i++) {
    var pw = p.powers[i];
    var div = document.createElement('div');
    div.className = 'power-item';
    div.innerHTML = '<div class="power-title">✨ ' + pw.title + '</div>' +
      '<div class="power-desc">' + pw.desc + '</div>';
    powersEl.appendChild(div);
  }

  // Blindspots
  var blindEl = document.getElementById('r-blindspots');
  blindEl.innerHTML = '';
  for (var i = 0; i < p.blindspots.length; i++) {
    var bl = p.blindspots[i];
    var div = document.createElement('div');
    div.className = 'blind-item';
    div.innerHTML = '<div class="blind-title">🔍 ' + bl.title + '</div>' +
      '<div class="blind-desc">' + bl.desc + '</div>';
    blindEl.appendChild(div);
  }

  document.getElementById('r-quote').textContent = '\u201c' + p.quote + '\u201d';
  document.getElementById('r-hashtags').textContent = p.hashtags;

  showScreen('screen-result');
}

function restartQuiz() {
  startQuiz();
}
</script>
