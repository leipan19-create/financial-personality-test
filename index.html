<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>财商人格测试 | 揭露你的金钱潜意识</title>
<style>
  :root {
    --bg: #111111;
    --card: #1c1c1c;
    --text: #f0f0f0;
    --text-dim: #888888;
    --accent: #e5e5e5;
    --border: #333333;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    -webkit-font-smoothing: antialiased;
  }

  .screen { display: none; width: 100%; max-width: 600px; padding: 40px 24px; margin: auto; }
  .screen.active { display: block; animation: fadeIn 0.5s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  #screen-welcome { text-align: left; padding-top: 20vh; }
  .welcome-title { font-size: 36px; font-weight: 800; margin-bottom: 16px; letter-spacing: -1px; line-height: 1.2; }
  .welcome-sub { font-size: 16px; color: var(--text-dim); margin-bottom: 40px; line-height: 1.6; }

  .btn-start {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--text); color: var(--bg); font-size: 16px; font-weight: 600;
    padding: 18px 24px; border-radius: 12px; border: none; cursor: pointer;
    width: 100%; margin-bottom: 16px; transition: transform 0.2s;
  }
  .btn-start:hover { transform: scale(0.98); }
  .btn-teen { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-teen:hover { background: var(--card); }

  .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; font-size: 14px; color: var(--text-dim); }
  .question-text { font-size: 22px; font-weight: 600; line-height: 1.5; margin-bottom: 32px; }

  .option-btn {
    display: flex; align-items: flex-start; gap: 16px;
    background: var(--card); border: 1px solid var(--card);
    border-radius: 12px; padding: 20px; margin-bottom: 12px; cursor: pointer;
    text-align: left; width: 100%; color: var(--text); font-size: 16px; line-height: 1.5;
    transition: all 0.2s ease;
  }
  .option-btn:hover { background: #262626; border-color: #444; transform: translateX(4px); }
  .option-label { font-weight: bold; color: var(--text-dim); }

  .back-btn { background: none; border: none; color: var(--text-dim); font-size: 14px; cursor: pointer; margin-top: 20px; padding: 10px 0; }
  .back-btn:hover { color: var(--text); }

  #screen-result { text-align: left; }
  .result-code { font-size: 18px; color: var(--text-dim); font-weight: bold; letter-spacing: 2px; margin-bottom: 8px; }
  .result-title { font-size: 42px; font-weight: 900; margin-bottom: 24px; letter-spacing: -1px; }

  .result-card { background: var(--card); border-radius: 16px; padding: 24px; margin-bottom: 20px; border: 1px solid var(--border); }
  .card-title { font-size: 14px; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
  .card-content { font-size: 16px; line-height: 1.6; }

  .trait-item { margin-bottom: 16px; }
  .trait-title { font-weight: bold; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
  .trait-desc { color: var(--text-dim); font-size: 14px; line-height: 1.5; }

  .restart-btn { background: var(--text); color: var(--bg); width: 100%; padding: 18px; border-radius: 12px; font-size: 16px; font-weight: bold; border: none; cursor: pointer; margin-top: 20px; }

  /* 财富关系网 */
  .connection-item { display: flex; gap: 16px; align-items: flex-start; }
  .conn-icon { font-size: 24px; flex-shrink: 0; }
  .conn-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
  .conn-name { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
  .conn-desc { font-size: 14px; color: var(--text-dim); line-height: 1.5; }
</style>
</head>
<body>

<div id="screen-welcome" class="screen active">
  <div class="welcome-title">你的财商<br>可能一直在裸奔。</div>
  <p class="welcome-sub">抛开那些银行问卷里"保本还是激进"的废话。<br>用 30 道直击灵魂的真实情景题，<br>测出你潜意识里的 <b>财商代码</b>。</p>
  <button class="btn-start" onclick="startQuiz('adult')">开始测试 (社会人版) <span>→</span></button>
  <button class="btn-start btn-teen" onclick="startQuiz('teen')">开始测试 (学生版) <span>→</span></button>
</div>

<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <span id="progress-text">1 / 30</span>
    <span id="mode-text">社会人版</span>
  </div>
  <div class="question-container" id="q-container">
    <div class="question-text" id="question-text">问题加载中...</div>
    <div id="options-list"></div>
  </div>
  <button class="back-btn" onclick="prevQuestion()" id="back-btn">← 上一题</button>
</div>

<!-- 伪加载页 -->
<div id="screen-loading" class="screen">
  <div style="padding-top: 35vh; text-align: center;">
    <div id="loading-text" style="font-size: 20px; font-weight: 600; min-height: 60px;"></div>
    <div style="margin-top: 32px; width: 100%; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden;">
      <div id="loading-bar" style="height: 100%; width: 0%; background: var(--text); transition: width 0.3s ease;"></div>
    </div>
  </div>
</div>

<div id="screen-result" class="screen">
  <div class="result-code" id="r-code">S-T 型</div>
  <div class="result-title" id="r-name">金库守卫者</div>

  <div class="result-card">
    <div class="card-title">💊 财富病例确诊</div>
    <div class="card-content" id="r-summary">你的钱一旦进了口袋，就相当于进了黑洞。</div>
  </div>

  <div class="result-card">
    <div class="card-title">💰 搞钱必杀技 &amp; 💸 漏财黑洞</div>
    <div id="r-traits"></div>
  </div>

  <div class="result-card" id="r-connections">
    <div class="card-title">你的财富关系网</div>
    <div class="connection-item">
      <span class="conn-icon">🤝</span>
      <div>
        <div class="conn-label">天生财友</div>
        <div class="conn-name" id="r-friend-name">XXX</div>
        <div class="conn-desc" id="r-friend-desc">原因说明</div>
      </div>
    </div>
    <div class="connection-item" style="margin-top:16px">
      <span class="conn-icon">⚔️</span>
      <div>
        <div class="conn-label">财富宿敌</div>
        <div class="conn-name" id="r-enemy-name">XXX</div>
        <div class="conn-desc" id="r-enemy-desc">原因说明</div>
      </div>
    </div>
  </div>

  <div style="text-align: center; margin-top: 40px; padding: 24px; background: var(--card); border-radius: 16px; border: 1px solid var(--border);">
    <div id="r-cta-text" style="font-size: 16px; margin-bottom: 12px; line-height: 1.6;"></div>
    <div style="color: var(--text-dim); font-size: 14px;">添加微信：<span style="color: var(--text); font-weight: bold;">panleicfa</span></div>
  </div>

  <button class="restart-btn" onclick="location.reload()">再测一次</button>
</div>

<script>
// =====================================================================
// 社会人版题库：30题，每题4个选项
// 主题覆盖：收入/年终奖/副业/投资/消费/借贷/职业/人生观
// =====================================================================
var QUESTIONS = [
  // --- 1-5 收入 / 工资 / 年终奖 / 副业 / 意外之财 ---
  {
    text: "叮！公司老板居然没画大饼，真给你发了 15 万年终奖。你的真实第一反应是：",
    options: [
      { label: "A", text: "雷打不动转进大额存单或提前还贷。落袋为安，看着那个数字才算真实拥有过。", score: { S: 1, T: 1 } },
      { label: "B", text: "打开行情软件复盘仓位，制定一份资产配置方案，本金来了要让它干活。", score: { G: 1, B: 1 } },
      { label: "C", text: "先存 3 万备用金，剩下的按比例分给基金、旅行和父母红包，每笔都有去处。", score: { G: 1, T: 1 } },
      { label: "D", text: "光速截图发群，打开携程订冰岛。钱不花就是废纸，15 万快乐指数拉满！", score: { F: 1, A: 1 } }
    ]
  },
  {
    text: "才10号，工资已经去了大半，账户余额正在用嘶喊声召唤你。你的应急方案是：",
    options: [
      { label: "A", text: "开启极限省钱模式：停掉所有外卖，午饭自带便当，能走路坚决不打车，熬到发薪日。", score: { S: 1, T: 1 } },
      { label: "B", text: "盘点一下月初哪些消费不必要，下个月重新设预算分类，这次是教训。", score: { S: 1, B: 1 } },
      { label: "C", text: "盘点一下最近能接的副业单子：公众号、拍视频、外包设计，先快速回笼一笔。", score: { G: 1, A: 1 } },
      { label: "D", text: "无所谓，直接把信用卡额度当二月份工资用，下个月再分期还，先过好今天。", score: { F: 1, A: 1 } }
    ]
  },
  {
    text: "深夜刷朋友圈，曾经成绩不如你的同学晒单：「靠副业上岸，月入10万」。你心里咯噔一下，然后：",
    options: [
      { label: "A", text: "微微一笑：「十有八九是割韭菜的微商。」划走，睡觉，明天照常上班。", score: { S: 1, T: 1 } },
      { label: "B", text: "默默点进他的主页研究商业模式，寻找可复制的路径，但不轻易表态。", score: { G: 1, T: 1 } },
      { label: "C", text: "认真分析：他做的这个赛道我能切入吗？用一周时间做个市场调研再决策。", score: { G: 1, B: 1 } },
      { label: "D", text: "直接私聊：「哥，带带我，学费多少？」冲就完了，机会转瞬即逝。", score: { F: 1, A: 1 } }
    ]
  },
  {
    text: "老同学酒后透露，他做自媒体副业月入2万，你心动了，但副业意味着要牺牲大量业余时间。你会：",
    options: [
      { label: "A", text: "心里算了算：下班后本来就是刷手机，钱是假的，时间是真的，不折腾了。", score: { S: 1, T: 1 } },
      { label: "B", text: "认真问他细节，回家研究方向可行性，如果三个月内没起色就放弃，止损要快。", score: { G: 1, B: 1 } },
      { label: "C", text: "当场拍板：「下周开始更新，帮我设计个封面。」行动力就是最大的竞争力。", score: { G: 1, A: 1 } },
      { label: "D", text: "喝完酒回家睡觉，下周忘得干干净净，人生嘛，得过且过，体验才是正道。", score: { F: 1, T: 1 } }
    ]
  },
  {
    text: "某天下午，彩票站老板跑来恭喜你：你买的那注小彩票中了 5 万块！第一反应是：",
    options: [
      { label: "A", text: "先存起来再说，冷静三天，想清楚用途再动，不能被意外之财冲昏头。", score: { S: 1, T: 1 } },
      { label: "B", text: "这是一笔「风险本金」，直接投进一直看好但没有闲钱买的那只资产。", score: { G: 1, A: 1 } },
      { label: "C", text: "拿出 1 万奖励自己一次旅行，剩下 4 万按正常理财计划分配，不多不少。", score: { G: 1, B: 1 } },
      { label: "D", text: "这是老天赏的零花钱，必须花在平时舍不得的地方，不然对不起这份运气。", score: { F: 1, A: 1 } }
    ]
  },
  // --- 6-10 投资 / 股票 / 基金 / 房产 / 创业 ---
  {
    text: "某个你重仓买入的基金，今天突然暴跌了 15%。你此时在想什么？",
    options: [
      { label: "A", text: "血压飙升，懊悔当初没买稳健理财，默默割肉，发誓这辈子不再买权益类产品。", score: { S: 1, A: 1 } },
      { label: "B", text: "去查暴跌的底层逻辑：基本面有没有变？没有的话继续持有，甚至考虑补仓。", score: { G: 1, B: 1 } },
      { label: "C", text: "冷静盯着 K 线图分析，如果跌破关键支撑位就止损，止损前不慌。", score: { G: 1, T: 1 } },
      { label: "D", text: "跌就跌吧，反正是闲钱，只要我不卖，韭菜就割不到我，静待花开。", score: { F: 1, T: 1 } }
    ]
  },
  {
    text: "好兄弟半夜神秘私信你：「哥们，踩中AI风口的创业项目，半年回本，就差你了！」你会：",
    options: [
      { label: "A", text: "礼貌回复「祝你发财」，然后拉黑。内心OS：又一个杀猪盘启动了。", score: { S: 1, T: 1 } },
      { label: "B", text: "回他：「发商业计划书、财务模型、退出机制来看看，数据不全不聊。」", score: { G: 1, T: 1 } },
      { label: "C", text: "约面谈，亲眼看产品，看团队，综合判断后决策，但要控制仓位。", score: { G: 1, B: 1 } },
      { label: "D", text: "热血沸腾直接问：「多少钱能上车？明天转给你！」大不了当交了学费。", score: { F: 1, A: 1 } }
    ]
  },
  {
    text: "你存了 30 万，够付一套房的首付。但现在楼市不明朗，你的决策是：",
    options: [
      { label: "A", text: "先买！租房的钱打水漂了，买了就是自己的，月供我能扛，安心最重要。", score: { S: 1, A: 1 } },
      { label: "B", text: "继续等，研究政策走向和城市人口流入数据，看清楚再出手，不急。", score: { G: 1, T: 1 } },
      { label: "C", text: "把 30 万分散配置到其他资产，租房住，保持资金流动性，机会来了更灵活。", score: { G: 1, B: 1 } },
      { label: "D", text: "30 万都押在首付上太无聊了，先拿去投资试试，翻倍了再考虑买房。", score: { F: 1, A: 1 } }
    ]
  },
  {
    text: "前同事找你合伙创业，项目靠谱，但需要你拿出 20 万真金白银入股。你会：",
    options: [
      { label: "A", text: "婉拒。20 万是我好几年的血汗钱，创业九死一生，我不是那块料。", score: { S: 1, T: 1 } },
      { label: "B", text: "花两周做尽职调查：看他过往履历、财务模型、竞品和退出机制，数据说话。", score: { G: 1, T: 1 } },
      { label: "C", text: "谈清楚股权比例和退出条款，如果条款合理，拿出最多 5 万当风险仓。", score: { G: 1, B: 1 } },
      { label: "D", text: "人信得过就够了，20 万全投，大不了重头再来，人生要赌才有意思。", score: { F: 1, A: 1 } }
    ]
  },
  {
    text: "你在网上看到一个号称「年化 18% 稳定收益」的理财产品，还有朋友担保背书。你怎么看？",
    options: [
      { label: "A", text: "「年化18%稳定收益」六个字同时出现，这就是骗局，一分钱都不投。", score: { S: 1, T: 1 } },
      { label: "B", text: "去查这家平台的备案资质、资金托管方式和合规记录，再决定要不要进一步了解。", score: { G: 1, T: 1 } },
      { label: "C", text: "让朋友详细说明底层资产和风控机制，不弄清楚来源绝不投钱。", score: { G: 1, B: 1 } },
      { label: "D", text: "先扔进去一万块试试水，收益到账了再加仓，反正只是一小部分。", score: { F: 1, A: 1 } }
    ]
  },
  // --- 11-15 消费 / 购物 / 奢侈 / 信用卡 / 朋友局 ---
  {
    text: "车贷、花呗、信用卡分期……面对「借钱消费」这件事，你内心深处的真实OS是：",
    options: [
      { label: "A", text: "负债是我的噩梦。能全款绝不分期，欠着别人的钱连觉都睡不踏实。", score: { S: 1, T: 1 } },
      { label: "B", text: "贷款利率低于我的投资收益率，那就是白捡便宜，不借才是傻子。", score: { G: 1, A: 1 } },
      { label: "C", text: "消费贷坚决不碰，但低息经营贷用于资产配置，这是两回事。", score: { G: 1, T: 1 } },
      { label: "D", text: "每月还款额不影响我喝咖啡蹦迪就行，分期不就是穷人版的印钞机吗？", score: { F: 1, A: 1 } }
    ]
  },
  {
    text: "几个朋友非要拉你去吃人均 2000 的黑珍珠餐厅，「就你没去过」。你心里在想：",
    options: [
      { label: "A", text: "「两千块够我吃一个月外卖了，头痛，找个借口鸽了吧。」", score: { S: 1, T: 1 } },
      { label: "B", text: "「好，局上有几个大佬，算社交投资，说不定聊出机会来。」", score: { G: 1, B: 1 } },
      { label: "C", text: "「吃一次体验一下可以，但下个月消费预算要压缩一笔来平衡。」", score: { G: 1, T: 1 } },
      { label: "D", text: "「冲！本来就想去！吃爽了我来买单，花就花吧，体验才是人生意义！」", score: { F: 1, A: 1 } }
    ]
  },
  {
    text: "商场打折季，你平时看上的那件大衣从 3000 元降到了 1200。你会：",
    options: [
      { label: "A", text: "「打折就打折，我的衣柜不需要它。」果断离场，一分不花才是真赢。", score: { S: 1, T: 1 } },
      { label: "B", text: "「已经研究了三个月，这个价格低于历史最低价，理性买入。」", score: { G: 1, B: 1 } },
      { label: "C", text: "「先买，回家比价，不满意七天无理由退货，反正不亏。」", score: { F: 1, B: 1 } },
      { label: "D", text: "「买买买！打折就是赚到了1800块！」顺便再拿几件同款配色。", score: { F: 1, A: 1 } }
    ]
  },
  {
    text: "信用卡账单出来了，这个月消费超出预算 40%。你的第一个动作是：",
    options: [
      { label: "A", text: "对账，逐条核查每笔消费是否必要，把不该花的找出来，纳入下月警戒清单。", score: { S: 1, T: 1 } },
      { label: "B", text: "分析超支原因并调整预算分类，也许是某类消费低估了，重新校准一次。", score: { G: 1, B: 1 } },
      { label: "C", text: "找一两个本月可以接的外包单快速回血，支出高就提高收入来对冲。", score: { G: 1, A: 1 } },
      { label: "D", text: "直接申请最低还款额，剩下的分期慢慢还，反正利息也没多少，活在当下。", score: { F: 1, A: 1 } }
    ]
  },
  {
    text: "某品牌联名款限量球鞋今晚 0 点抢购，朋友说「必买」。这双鞋要 3000 块，你：",
    options: [

// =====================================================================
// 人格主题色
// =====================================================================
var PERSONALITY_COLORS = {
  "S": "#C9A84C",
  "G": "#00FF87",
  "F": "#BF5FFF"
};

// =====================================================================
// 定制化引流文案
// =====================================================================
var CTA = {
  "S-T": "想打破通胀魔咒，让钱真正动起来？",
  "S-B": "想把\u201c差不多\u201d变成真正的财务增长？",
  "S-A": "想把存钱冲动转化成系统性财富积累？",
  "G-T": "想把满脑子的策略真正落地执行？",
  "G-B": "想找到那个值得All-in的机会？",
  "G-A": "想让行动力配上更精准的判断力？",
  "F-T": "想让梦想真正从计划走进现实？",
  "F-B": "想在享受生活的同时建立真正的财务安全垫？",
  "F-A": "想在自由消费的同时，拥有一个不崩的财务底线？",
  "default": "想终结财务内耗，找到属于你的搞钱路径？"
};

var currentMode = "adult";
var currentQ = 0;
var answers = [];
var activeQuestions = [];

function startQuiz(mode) {
  currentMode = mode;
  activeQuestions = mode === "teen" ? QUESTIONS_TEEN : QUESTIONS;
  currentQ = 0;
  answers = [];
  document.getElementById("mode-text").textContent = mode === "teen" ? "学生版" : "社会人版";

  document.querySelectorAll(".screen").forEach(function(el) { el.classList.remove("active"); });
  document.getElementById("screen-quiz").classList.add("active");
  renderQuestion();
}

function renderQuestion() {
  var q = activeQuestions[currentQ];
  document.getElementById("progress-text").textContent = (currentQ + 1) + " / " + activeQuestions.length;
  document.getElementById("question-text").textContent = q.text;

  var list = document.getElementById("options-list");
  list.innerHTML = "";

  var container = document.getElementById("q-container");
  container.style.animation = "none";
  container.offsetHeight;
  container.style.animation = "fadeIn 0.4s ease";

  q.options.forEach(function(opt, idx) {
    var btn = document.createElement("div");
    btn.className = "option-btn";
    btn.innerHTML = "<span class=\"option-label\">" + opt.label + "</span><span>" + opt.text + "</span>";
    btn.onclick = (function(i) { return function() { selectOption(i); }; })(idx);
    list.appendChild(btn);
  });

  document.getElementById("back-btn").style.visibility = currentQ === 0 ? "hidden" : "visible";
}

function selectOption(idx) {
  answers[currentQ] = activeQuestions[currentQ].options[idx].score;
  setTimeout(function() {
    currentQ++;
    if (currentQ >= activeQuestions.length) {
      showLoading();
    } else {
      renderQuestion();
    }
  }, 150);
}

function prevQuestion() {
  if (currentQ > 0) { currentQ--; renderQuestion(); }
}

// =====================================================================
// 伪加载页逻辑
// =====================================================================
function showLoading() {
  document.querySelectorAll(".screen").forEach(function(el) { el.classList.remove("active"); });
  document.getElementById("screen-loading").classList.add("active");

  var messages = [
    "正在提取你的消费潜意识...",
    "正在扫描你的搞钱 DNA...",
    "正在生成你的财富病例..."
  ];

  var bar = document.getElementById("loading-bar");
  var textEl = document.getElementById("loading-text");

  // 重置
  bar.style.transition = "none";
  bar.style.width = "0%";
  textEl.textContent = "";

  var totalDuration = 2500;
  var msgInterval = totalDuration / messages.length; // ~833ms each

  messages.forEach(function(msg, i) {
    setTimeout(function() {
      textEl.style.opacity = "0";
      setTimeout(function() {
        textEl.textContent = msg;
        textEl.style.transition = "opacity 0.2s ease";
        textEl.style.opacity = "1";
      }, 150);
    }, i * msgInterval);
  });

  // 进度条从0到100%，用2.5秒
  setTimeout(function() {
    bar.style.transition = "width " + totalDuration + "ms linear";
    bar.style.width = "100%";
  }, 50);

  // 2.5秒后跳转结果页
  setTimeout(function() {
    showResult();
  }, totalDuration);
}

// =====================================================================
// 结果页
// =====================================================================
function showResult() {
  var scores = { S: 0, G: 0, F: 0, T: 0, B: 0, A: 0 };
  answers.forEach(function(scoreObj) {
    for (var key in scoreObj) { scores[key] += scoreObj[key]; }
  });

  var dim1 = ["S", "G", "F"].sort(function(a, b) { return scores[b] - scores[a]; })[0];
  var dim2 = ["T", "B", "A"].sort(function(a, b) { return scores[b] - scores[a]; })[0];
  var code = dim1 + "-" + dim2;

  var p = PERSONALITIES[code] || PERSONALITIES["default"];
  var conn = CONNECTIONS[code] || CONNECTIONS["default"];
  var ctaText = CTA[code] || CTA["default"];
  var titleColor = PERSONALITY_COLORS[dim1] || "#f0f0f0";

  document.getElementById("r-code").textContent = code + " 型";

  var nameEl = document.getElementById("r-name");
  nameEl.textContent = p.name;
  nameEl.style.color = titleColor;

  document.getElementById("r-summary").textContent = p.summary;

  var traitsHtml = "";
  p.traits.forEach(function(t) {
    traitsHtml += "<div class=\"trait-item\"><div class=\"trait-title\">" + t.t + "</div><div class=\"trait-desc\">" + t.d + "</div></div>";
  });
  document.getElementById("r-traits").innerHTML = traitsHtml;

  // 财富关系网
  document.getElementById("r-friend-name").textContent = conn.friend.name + "（" + conn.friend.code + "）";
  document.getElementById("r-friend-desc").textContent = conn.friend.desc;
  document.getElementById("r-enemy-name").textContent = conn.enemy.name + "（" + conn.enemy.code + "）";
  document.getElementById("r-enemy-desc").textContent = conn.enemy.desc;

  // 引流文案
  document.getElementById("r-cta-text").textContent = ctaText;

  document.querySelectorAll(".screen").forEach(function(el) { el.classList.remove("active"); });
  document.getElementById("screen-result").classList.add("active");
}
