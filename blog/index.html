<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客 · 潘雷 CFA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; }
        .serif { font-family: 'Noto Serif SC', serif; }
        .article-card { transition: all 0.3s ease; }
        .article-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.08); }
    </style>
</head>
<body class="bg-white text-slate-800">

    <!-- 顶部导航 -->
    <nav class="border-b border-slate-100">
        <div class="max-w-3xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="text-sm text-slate-400 hover:text-slate-700 transition-colors">← 返回首页</a>
            <h1 class="text-sm font-medium text-slate-500 tracking-wider">BLOG</h1>
            <span class="text-sm text-slate-400">潘雷 CFA</span>
        </div>
    </nav>

    <!-- 头部 -->
    <header class="max-w-3xl mx-auto px-6 pt-16 pb-10">
        <h2 class="serif text-3xl md:text-4xl font-bold mb-4">想清楚，再出发</h2>
        <p class="text-slate-500 text-lg leading-relaxed">
            用 CFA + PE/VC 的视角读书，写给在职业和人生路口的人。<br>
            不是答案，是帮你想清楚的工具。
        </p>
    </header>

    <!-- 文章列表 -->
    <main class="max-w-3xl mx-auto px-6 pb-20" id="article-list">
        <div class="text-slate-400 text-sm">加载中...</div>
    </main>

    <!-- 页脚 -->
    <footer class="border-t border-slate-100">
        <div class="max-w-3xl mx-auto px-6 py-8 text-center">
            <p class="text-sm text-slate-400">
                © 2026 潘雷 CFA · <a href="/" class="hover:text-slate-600 transition-colors">人格实验室</a>
                · <a href="https://www.xiaohongshu.com/" class="hover:text-slate-600 transition-colors">闲鱼</a>
                · 微信: panleicfa
            </p>
        </div>
    </footer>

    <script>
        async function loadArticles() {
            try {
                const resp = await fetch('/blog/articles.json?t=' + Date.now());
                const articles = await resp.json();
                const list = document.getElementById('article-list');

                if (articles.length === 0) {
                    list.innerHTML = '<p class="text-slate-400">还没有文章，敬请期待。</p>';
                    return;
                }

                // 按日期倒序
                articles.sort((a, b) => new Date(a.date) - new Date(b.date));

                list.innerHTML = articles.map(a => `
                    <a href="/blog/articles/${a.slug}.html" class="article-card block p-6 -mx-6 rounded-xl mb-4 hover:bg-slate-50 group">
                        <div class="flex items-center gap-3 mb-2">
                            <time class="text-xs text-slate-400">${a.date}</time>
                            ${a.tags ? a.tags.map(t => `<span class="text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-500">${t}</span>`).join('') : ''}
                        </div>
                        <h3 class="serif text-xl font-bold mb-2 group-hover:text-blue-600 transition-colors">${a.title}</h3>
                        <p class="text-slate-500 text-sm leading-relaxed">${a.excerpt}</p>
                        <span class="inline-block mt-3 text-xs text-slate-400 group-hover:text-blue-500 transition-colors">阅读全文 →</span>
                    </a>
                `).join('');
            } catch (e) {
                document.getElementById('article-list').innerHTML = '<p class="text-slate-400">加载失败，请刷新重试。</p>';
            }
        }

        loadArticles();
    </script>

</body>
</html>
