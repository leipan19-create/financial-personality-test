<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JDT AI 人生教练 · 让产品说话</title>
    <link rel="preconnect" href="https://api.dify.ai">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #f8fafc; color: #0f172a; height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }
        a { text-decoration: none; color: inherit; }

        /* Header */
        .header { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .header-back { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #475569; transition: background 0.2s; cursor: pointer; border: none; background: none; font-size: 18px; }
        .header-back:hover { background: #f1f5f9; }
        .header-title { font-weight: 700; font-size: 16px; }
        .header-sub { font-size: 12px; color: #94a3b8; }
        .header-badge { background: #fef3c7; color: #b45309; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; margin-left: auto; }

        /* Chat area */
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; scroll-behavior: smooth; }

        /* Messages */
        .msg { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.3s ease; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .msg.bot .msg-avatar { background: linear-gradient(135deg, #fbbf24, #f97316); }
        .msg.user .msg-avatar { background: #e2e8f0; font-size: 14px; color: #475569; }
        .msg-bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.7; word-break: break-word; }
        .msg.bot .msg-bubble { background: #fff; border: 1px solid #e2e8f0; border-top-left-radius: 4px; }
        .msg.user .msg-bubble { background: #0f172a; color: #fff; border-top-right-radius: 4px; }
        .msg-bubble p { margin-bottom: 8px; }
        .msg-bubble p:last-child { margin-bottom: 0; }
        .msg-bubble ul, .msg-bubble ol { margin: 8px 0; padding-left: 20px; }
        .msg-bubble strong { font-weight: 600; }
        .msg-bubble code { background: rgba(0,0,0,0.06); padding: 1px 4px; border-radius: 4px; font-size: 13px; }
        .msg.user .msg-bubble code { background: rgba(255,255,255,0.15); }

        /* Welcome */
        .welcome { text-align: center; padding: 40px 20px; }
        .welcome-icon { font-size: 48px; margin-bottom: 16px; }
        .welcome h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
        .welcome p { color: #64748b; font-size: 14px; max-width: 400px; margin: 0 auto; line-height: 1.7; }
        .welcome-tips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
        .tip-btn { background: #fff; border: 1px solid #e2e8f0; border-radius: 20px; padding: 8px 16px; font-size: 13px; color: #475569; cursor: pointer; transition: all 0.2s; }
        .tip-btn:hover { background: #fef3c7; border-color: #fbbf24; color: #92400e; }

        /* Typing indicator */
        .typing { display: flex; gap: 4px; padding: 12px 16px; }
        .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: #cbd5e1; animation: blink 1.4s infinite both; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        /* Input area */
        .input-area { background: #fff; border-top: 1px solid #e2e8f0; padding: 16px 20px; flex-shrink: 0; }
        .input-wrap { display: flex; gap: 10px; max-width: 768px; margin: 0 auto; }
        .input-box { flex: 1; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px 16px; font-size: 14px; outline: none; resize: none; font-family: inherit; line-height: 1.5; max-height: 120px; transition: border-color 0.2s; }
        .input-box:focus { border-color: #f59e0b; }
        .input-box::placeholder { color: #94a3b8; }
        .send-btn { width: 42px; height: 42px; border-radius: 12px; background: #0f172a; color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; flex-shrink: 0; }
        .send-btn:hover { background: #f59e0b; }
        .send-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        .send-btn svg { width: 20px; height: 20px; }

        /* Scrollbar */
        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

        /* Footer */
        .footer-note { text-align: center; font-size: 11px; color: #cbd5e1; padding: 4px 0 8px; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

        @media (max-width: 640px) {
            .msg { max-width: 92%; }
            .chat-area { padding: 12px; }
            .input-area { padding: 12px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <button class="header-back" onclick="history.back()">←</button>
        <div>
            <div class="header-title">🧠 JDT AI 人生教练</div>
            <div class="header-sub">突破限制性信念 · 找到第三选择</div>
        </div>
        <span class="header-badge">AI</span>
    </div>

    <div class="chat-area" id="chatArea">
        <div class="welcome" id="welcomeBlock">
            <div class="welcome-icon">🧠</div>
            <h2>JDT AI 人生教练</h2>
            <p>我是你的 AI 人生教练，帮你突破限制性信念，找到属于你的第三选择。聊聊你正在面对的困惑吧。</p>
            <div class="welcome-tips">
                <button class="tip-btn" onclick="sendTip(this)">我想找到职业方向</button>
                <button class="tip-btn" onclick="sendTip(this)">如何突破当前瓶颈</button>
                <button class="tip-btn" onclick="sendTip(this)">帮我做决策</button>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrap">
            <textarea class="input-box" id="inputBox" placeholder="输入你想聊的内容..." rows="1" onkeydown="handleKey(event)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </div>
        <div class="footer-note">AI 生成内容仅供参考</div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const inputBox = document.getElementById('inputBox');
        const sendBtn = document.getElementById('sendBtn');
        const welcomeBlock = document.getElementById('welcomeBlock');

        let conversationId = '';
        let isStreaming = false;
        let currentBotBubble = null;
        let currentBotContent = '';

        // Generate a simple user ID
        const userId = 'u-' + Math.random().toString(36).slice(2, 10);

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function sendTip(btn) {
            inputBox.value = btn.textContent;
            sendMessage();
        }

        function scrollToBottom() {
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function addMessage(type, content) {
            if (welcomeBlock) welcomeBlock.style.display = 'none';

            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${type}`;

            const avatar = document.createElement('div');
            avatar.className = 'msg-avatar';
            avatar.textContent = type === 'bot' ? '🧠' : '我';

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.innerHTML = content;

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            chatArea.appendChild(msgDiv);
            scrollToBottom();

            return bubble;
        }

        function showTyping() {
            if (welcomeBlock) welcomeBlock.style.display = 'none';
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg bot';
            msgDiv.id = 'typingMsg';

            const avatar = document.createElement('div');
            avatar.className = 'msg-avatar';
            avatar.textContent = '🧠';

            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble';
            bubble.innerHTML = '<div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            chatArea.appendChild(msgDiv);
            scrollToBottom();
        }

        function removeTyping() {
            const el = document.getElementById('typingMsg');
            if (el) el.remove();
        }

        function formatContent(text) {
            // Simple markdown-like formatting
            let html = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.*?)`/g, '<code>$1</code>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>')
                .replace(/^/, '<p>')
                .replace(/$/, '</p>');
            return html;
        }

        async function sendMessage() {
            const text = inputBox.value.trim();
            if (!text || isStreaming) return;

            inputBox.value = '';
            inputBox.style.height = 'auto';
            addMessage('user', formatContent(text));
            isStreaming = true;
            sendBtn.disabled = true;

            showTyping();

            try {
                const resp = await fetch('/api/proxy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        path: '/chat-messages',
                        method: 'POST',
                        query: text,
                        user: userId,
                        inputs: {},
                        response_mode: 'streaming',
                        conversation_id: conversationId,
                    }),
                });

                removeTyping();

                if (!resp.ok) {
                    const err = await resp.json();
                    addMessage('bot', '<p>抱歉，出了点问题：' + (err.message || '请稍后重试') + '</p>');
                    isStreaming = false;
                    sendBtn.disabled = false;
                    return;
                }

                // Create bot message bubble for streaming
                const msgDiv = document.createElement('div');
                msgDiv.className = 'msg bot';
                const avatar = document.createElement('div');
                avatar.className = 'msg-avatar';
                avatar.textContent = '🧠';
                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble';
                msgDiv.appendChild(avatar);
                msgDiv.appendChild(bubble);
                chatArea.appendChild(msgDiv);

                currentBotContent = '';
                currentBotBubble = bubble;

                const reader = resp.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const data = line.slice(6).trim();
                        if (data === '[DONE]') continue;

                        try {
                            const json = JSON.parse(data);
                            if (json.event === 'message' || json.event === 'agent_message') {
                                currentBotContent += json.answer || '';
                                currentBotBubble.innerHTML = formatContent(currentBotContent);
                                scrollToBottom();
                            } else if (json.event === 'message_end') {
                                conversationId = json.conversation_id || '';
                            }
                        } catch (e) { /* skip parse errors */ }
                    }
                }

                // If no content was streamed, show placeholder
                if (!currentBotContent) {
                    currentBotBubble.innerHTML = '<p>教练在思考中...</p>';
                }

            } catch (err) {
                removeTyping();
                addMessage('bot', '<p>连接失败：' + err.message + '</p>');
            }

            isStreaming = false;
            sendBtn.disabled = false;
            inputBox.focus();
        }

        // Auto-resize textarea
        inputBox.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
    </script>
</body>
</html>
